name: esdv

content:
  enable_repos:
    - devel
  repos: []
  rpms:
    - openssh-server
    - podman
    - bluechi-ctl
    - bluechi-is-online
    - hostname
    - crun
    - fuse-overlayfs
    - dnf
  container_images:
    - source: ghcr.io/rust-cross/rust-musl-cross
      tag: x86_64-musl
      name: ghcr.io/rust-cross/rust-musl-cross:x86_64-musl
  systemd:
    enabled_services:
      - esdv-blueprint-mount.service
  chmod_files:
    # esdv-check-blueprint-vol
    - path: /usr/local/bin/esdv-check-blueprint-vol
      mode: "0755"
      recursive: false
  add_files:
    # esdv-check-blueprint-vol
    - source_path: ../files/usr/local/bin/esdv-check-blueprint-vol
      path: /usr/local/bin/esdv-check-blueprint-vol
    # esdv-blueprint-mount.service
    - source_path: ../files/etc/systemd/system/esdv-blueprint-mount.service
      path: /etc/systemd/system/esdv-blueprint-mount.service
    # esdv.network
    - source_path: ../files/etc/containers/systemd/esdv.network
      path: /etc/containers/systemd/esdv.network

qm:
  memory_limit:
    max: infinity
    high: infinity
  content:
    enable_repos:
      - debug
    repos: []
    rpms:
      - git

image:
  hostname: esdv-main-compute
  selinux_booleans:
    domain_can_mmap_files: true
  image_size: 10 GiB
  partitions:
    boot:
      size: 300 MiB

network:
  static: {}

auth:
  root_password: $6$xoLqEUz0cGGJRx01$H3H/bFm0myJPULNMtbSsOFd/2BnHqHkMD92Sfxd.EKM9hXTWSmELG8cf205l6dktomuTcgKGGtGDgtvHVXSWU.
  sshd_config:
    PasswordAuthentication: true
    PermitRootLogin: true
  groups:
    guest:
      gid: 2000
