name: esdv

image:
  hostname: esdv-main-compute
  selinux_booleans:
    domain_can_mmap_files: true

auth:
  groups:
    guest:
      gid: 2000
  sshd_config:
    PasswordAuthentication: true
    PermitRootLogin: true

content:
  enable_repos:
    - devel
  rpms:
    # basic packages
    - bash
    - dnf
    - vim
    - openssh-server
    # bluechi packages
    - bluechi-selinux
    - bluechi-controller
    - bluechi-agent
    - bluechi-ctl
  add_files:
    # qm files
    - path: /etc/containers/systemd/qm.container.d/11-bluechi-socket.conf
      source_path: ../files/etc/containers/systemd/qm.container.d/00-bluechi-socket.conf
    # bluechi files
    - path: /etc/bluechi/controller.conf.d/0-main.conf
      source_path: ../files/etc/bluechi/controller.conf.d/0-main.conf
    - path: /etc/bluechi/agent.conf.d/0-main.conf
      source_path: ../files/etc/bluechi/agent.conf.d/0-main.conf
  systemd:
    enabled_services:
      - sshd.service
      - bluechi-controller.service
      - bluechi-agent.service

qm:
  memory_limit:
    max: infinity
    high: infinity
  content:
    enable_repos:
      - debug
    rpms:
      - git
      - bluechi-agent 
    add_files:
      # bluechi files
      - path: /etc/bluechi/agent.conf.d/0-qm.conf
        source_path: ../files/etc/bluechi/agent.conf.d/0-qm.conf 
    systemd:
      enabled_services:
        - bluechi-agent
